<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бағалау транспортирі</title>
    
    <!-- Tailwind CSS (Дизайн үшін) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React және ReactDOM кітапханалары -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (React JSX кодын браузерде оқу үшін) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-900">
    <!-- Осы жерге біздің қосымша шығады -->
    <div id="root"></div>

    <!-- React коды осы скрипттің ішінде жазылады -->
    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // 1-ден 10-ға дейінгі нүктелерді және олардың орналасу бұрыштарын есептеу
        const nodes = Array.from({ length: 10 }, (_, i) => {
          const value = i + 1;
          const angleDeg = -80 + (i * (160 / 9)); // -80-нен +80 градусқа дейін
          const angleRad = angleDeg * Math.PI / 180;
          const r = 240; // Транспортир радиусы
          
          const x = 300 + r * Math.sin(angleRad);
          const y = 300 - r * Math.cos(angleRad);
          
          const colors = [
            '#f43f5e', '#fb7185', '#fb923c', '#facc15', '#a3e635', 
            '#4ade80', '#34d399', '#2dd4bf', '#22d3ee', '#38bdf8'
          ];

          return { value, angleDeg, x, y, color: colors[i] };
        });

        // Фейерверк анимациясы компоненті (8, 9, 10 балдар үшін)
        const Fireworks = ({ x, y, color }) => {
          const particles = Array.from({ length: 30 });
          return (
            <div className="absolute pointer-events-none z-50" style={{ left: x, top: y }}>
              {particles.map((_, i) => {
                const angle = Math.random() * Math.PI * 2;
                const velocity = 40 + Math.random() * 80;
                const dx = Math.cos(angle) * velocity;
                const dy = Math.sin(angle) * velocity;
                return (
                  <div
                    key={i}
                    className="firework-particle"
                    style={{
                      backgroundColor: color,
                      '--dx': `${dx}px`,
                      '--dy': `${dy}px`,
                    }}
                  />
                );
              })}
            </div>
          );
        };

        function App() {
          const [score, setScore] = useState(10);
          const [isDragging, setIsDragging] = useState(false);
          // Әр баллдың қанша рет басылғанын сақтайтын статистика
          const [stats, setStats] = useState(
            Array.from({ length: 10 }, (_, i) => ({ value: i + 1, count: 0 }))
          );
          
          const [bursts, setBursts] = useState([]);
          const [plusOnes, setPlusOnes] = useState([]); // "+1" анимацияларын сақтау
          const [lastUpdatedId, setLastUpdatedId] = useState(null);
          
          const svgRef = useRef(null);

          // Дауысты тіркеу (Статистиканы өсіру)
          const registerVote = (votedScore) => {
            setStats((prev) => 
              prev.map(stat => stat.value === votedScore ? { ...stat, count: stat.count + 1 } : stat)
            );
            
            setLastUpdatedId(votedScore);
            setTimeout(() => setLastUpdatedId(null), 500);

            const newPlusOne = { id: Date.now(), value: votedScore };
            setPlusOnes((prev) => [...prev, newPlusOne]);
            setTimeout(() => {
              setPlusOnes((prev) => prev.filter((p) => p.id !== newPlusOne.id));
            }, 1000);

            if (votedScore >= 8) {
              const targetNode = nodes.find(n => n.value === votedScore);
              if (svgRef.current) {
                const rect = svgRef.current.getBoundingClientRect();
                const scaleX = rect.width / 600;
                const scaleY = rect.height / 350;
                const burstX = rect.left + targetNode.x * scaleX;
                const burstY = rect.top + targetNode.y * scaleY;
                
                const newBurst = { id: Date.now(), x: burstX, y: burstY, color: targetNode.color };
                setBursts((prev) => [...prev, newBurst]);
                setTimeout(() => setBursts((prev) => prev.filter((b) => b.id !== newBurst.id)), 1000);
              }
            }
          };

          const calculateAndSetScore = (e) => {
            const svg = svgRef.current;
            if (!svg) return;

            const rect = svg.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            
            const svgX = (clientX - rect.left) * (600 / rect.width);
            const svgY = (clientY - rect.top) * (350 / rect.height);

            const dx = svgX - 300;
            const dy = svgY - 300;
            const angle = Math.atan2(dx, -dy) * 180 / Math.PI;

            let closestNode = nodes[0];
            let minDiff = Infinity;
            for (let node of nodes) {
              const diff = Math.abs(node.angleDeg - angle);
              if (diff < minDiff) {
                minDiff = diff;
                closestNode = node;
              }
            }

            setScore(closestNode.value);
          };

          const handlePointerDown = (e) => {
            setIsDragging(true);
            calculateAndSetScore(e);
          };

          const handlePointerMove = (e) => {
            if (!isDragging) return;
            calculateAndSetScore(e);
          };

          const handlePointerUp = () => {
            if (isDragging) {
              setIsDragging(false);
              registerVote(score);
            }
          };

          const activeNode = nodes.find((n) => n.value === score) || nodes[9];
          const maxStatCount = Math.max(...stats.map(s => s.count), 1);

          return (
            <div className="min-h-screen bg-gray-900 text-white font-sans overflow-hidden flex flex-col items-center p-4 md:p-8 relative select-none">
              
              <style>{`
                .firework-particle {
                  position: absolute;
                  width: 10px;
                  height: 10px;
                  border-radius: 50%;
                  animation: shoot 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
                }
                @keyframes shoot {
                  0% { transform: translate(0, 0) scale(1); opacity: 1; }
                  100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
                }
                .float-up {
                  animation: floatUp 1s ease-out forwards;
                }
                @keyframes floatUp {
                  0% { transform: translateY(10px) scale(0.5); opacity: 0; }
                  20% { transform: translateY(0px) scale(1.2); opacity: 1; }
                  100% { transform: translateY(-30px) scale(1); opacity: 0; }
                }
                .highlight-bar {
                  animation: flash 0.5s ease-out;
                }
                @keyframes flash {
                  0% { filter: brightness(1); transform: scale(1); }
                  50% { filter: brightness(1.5); transform: scale(1.02); }
                  100% { filter: brightness(1); transform: scale(1); }
                }
              `}</style>

              {bursts.map((burst) => (
                <Fireworks key={burst.id} x={burst.x} y={burst.y} color={burst.color} />
              ))}

              <div className="w-full max-w-[95%] xl:max-w-[1600px] mx-auto flex flex-col lg:flex-row gap-8 lg:gap-12 items-center lg:items-center">
                
                {/* СОЛ ЖАҚ: ТРАНСПОРТИР */}
                <div className="w-full flex-1 lg:flex-[3] xl:flex-[4] flex flex-col">
                  <div className="mb-6 text-center lg:text-left">
                    <h1 className="text-3xl md:text-5xl lg:text-6xl font-extrabold text-cyan-400 uppercase tracking-wider mb-2">
                      Бағалау транспортирі
                    </h1>
                    <p className="text-base md:text-xl lg:text-2xl text-cyan-100/80 font-medium italic">
                      Бағаңды таңда да, стрелканы бағытта!
                    </p>
                  </div>

                  <div 
                    className="w-full relative touch-none cursor-pointer"
                    onPointerDown={handlePointerDown}
                    onPointerMove={handlePointerMove}
                    onPointerUp={handlePointerUp}
                    onPointerLeave={handlePointerUp}
                  >
                    <svg 
                      ref={svgRef}
                      viewBox="0 0 600 350" 
                      className="w-full h-auto drop-shadow-2xl"
                      style={{ overflow: 'visible' }}
                    >
                      <path d="M 64.08, 258.33 A 240 240 0 0 1 535.91, 258.33" fill="none" stroke="#1f2937" strokeWidth="12" strokeLinecap="round" />
                      <path d="M 64.08, 258.33 A 240 240 0 0 1 535.91, 258.33" fill="none" stroke="url(#gradient)" strokeWidth="6" strokeLinecap="round" opacity="0.7"/>
                      
                      <defs>
                        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                          <stop offset="0%" stopColor="#f43f5e" />
                          <stop offset="50%" stopColor="#facc15" />
                          <stop offset="100%" stopColor="#22d3ee" />
                        </linearGradient>
                      </defs>

                      {nodes.map((node) => {
                        const isActive = score === node.value;
                        return (
                          <g 
                            key={node.value} 
                            transform={`translate(${node.x}, ${node.y})`}
                            className="transition-transform duration-200 hover:scale-110"
                          >
                            <circle 
                              r={isActive ? "24" : "20"} 
                              fill={isActive ? node.color : "#111827"} 
                              stroke={node.color} 
                              strokeWidth={isActive ? "4" : "2"} 
                              className="transition-all duration-300 shadow-lg"
                            />
                            <text 
                              fill={isActive ? "#fff" : node.color} 
                              fontSize={isActive ? "22" : "18"} 
                              fontWeight="bold" 
                              textAnchor="middle" 
                              dy=".35em"
                              className="transition-all duration-300 font-sans"
                            >
                              {node.value}
                            </text>
                          </g>
                        );
                      })}

                      <g transform={`rotate(${activeNode.angleDeg}, 300, 300)`} style={{ transition: 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)' }}>
                        <line x1="300" y1="300" x2="300" y2="80" stroke="#f3f4f6" strokeWidth="6" strokeLinecap="round" />
                        <polygon points="300,60 285,90 315,90" fill={activeNode.color} className="transition-colors duration-300"/>
                      </g>

                      <circle cx="300" cy="300" r="20" fill="#1f2937" />
                      <circle cx="300" cy="300" r="10" fill={activeNode.color} className="transition-colors duration-300" />
                    </svg>
                  </div>
                </div>

                {/* ОҢ ЖАҚ: СТАТИСТИКА (БАҒАНДАР) */}
                <div className="w-full lg:w-[250px] xl:w-[300px] flex-shrink-0 bg-gray-800/80 backdrop-blur-md rounded-2xl p-4 md:p-6 border border-gray-700 shadow-xl flex flex-col">
                  <h2 className="text-lg md:text-xl font-bold text-white mb-4 uppercase tracking-wider text-center flex items-center justify-center gap-2">
                    <svg className="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                    Нәтижелер
                  </h2>
                  
                  <div className="flex flex-col gap-2.5 flex-1 justify-center">
                    {stats.slice().reverse().map((stat) => {
                      const nodeConfig = nodes.find(n => n.value === stat.value);
                      const percentage = stat.count === 0 ? 0 : Math.max(8, (stat.count / maxStatCount) * 100);
                      const isUpdated = lastUpdatedId === stat.value;
                      
                      return (
                        <div key={stat.value} className="flex items-center gap-3 group">
                          <div 
                            className="w-8 h-8 rounded-lg flex items-center justify-center font-black text-sm flex-shrink-0"
                            style={{ backgroundColor: `${nodeConfig.color}20`, color: nodeConfig.color }}
                          >
                            {stat.value}
                          </div>
                          
                          <div className="flex-1 relative h-6 bg-gray-900 rounded-lg overflow-visible flex items-center border border-gray-700/50 p-0.5">
                            <div 
                              className={`h-full rounded-md transition-all duration-500 ease-out flex items-center justify-end px-2 ${isUpdated ? 'highlight-bar' : ''}`}
                              style={{ 
                                width: `${percentage}%`, 
                                backgroundColor: nodeConfig.color,
                                boxShadow: isUpdated ? `0 0 10px ${nodeConfig.color}` : 'none'
                              }} 
                            />

                            {plusOnes.map(p => p.value === stat.value && (
                              <div 
                                key={p.id} 
                                className="absolute left-1/2 text-lg font-black float-up pointer-events-none drop-shadow-md z-10"
                                style={{ color: nodeConfig.color }}
                              >
                                +1
                              </div>
                            ))}
                          </div>

                          <div 
                            className="w-6 text-right font-bold text-sm transition-colors duration-300"
                            style={{ color: stat.count > 0 ? '#ffffff' : '#6b7280' }}
                          >
                            {stat.count}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
                
              </div>
            </div>
          );
        }

        // React қосымшасын HTML бетіне орнату
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
